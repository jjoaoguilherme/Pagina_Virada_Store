{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Página Virada{% endblock %}</title>

  <!-- Bootstrap CSS e Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    html, body { height:100%; margin:0; }
    body { display:flex; flex-direction:column; }
    main { flex:1; }
    footer {
      background:#212529; color:white;
      padding:20px 0; text-align:center;
    }
    .search-bar { width:600px; }
    .badge-cart {
      font-size: 0.75rem;
      padding: 3px 6px;
      border-radius: 50%;
    }
  </style>
</head>
<body>

{% include "global/partials/navmenu.html" %}   

<main class="container mt-4">
  {% block content %}{% endblock %}
</main>

<footer class="mt-auto">
  <div class="container">
    <p class="mb-0">&copy; 2025 Página Virada Store - Todos os direitos reservados.</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
